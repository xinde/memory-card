<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆翻牌 - 益智游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 15px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }

        .info-bar {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
        }

        .info-box {
            background: rgba(255,255,255,0.95);
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 1.5rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .info-box span {
            color: #11998e;
            font-weight: bold;
            font-size: 1.8rem;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            background: rgba(255,255,255,0.9);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            max-width: 600px;
        }

        .card {
            width: 120px;
            height: 120px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            font-size: 3.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .card-back {
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            transform: rotateY(180deg);
            border: 4px solid #11998e;
        }

        .card.matched .card-back {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border-color: #ffd700;
        }

        .start-btn {
            margin-top: 25px;
            padding: 18px 50px;
            font-size: 1.6rem;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(238,90,36,0.4);
            transition: all 0.3s;
            font-weight: bold;
        }

        .start-btn:hover {
            transform: translateY(-3px);
        }

        .start-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* 特效 */
        .match-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            animation: matchPop 0.6s ease-out;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes matchPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        .encourage {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.8rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 3px 3px 0 #11998e;
            animation: encouragePop 1s ease-out forwards;
            z-index: 101;
            pointer-events: none;
        }

        @keyframes encouragePop {
            0% { transform: translateX(-50%) scale(0); opacity: 0; }
            20% { transform: translateX(-50%) scale(1.3); opacity: 1; }
            100% { transform: translateX(-50%) translateY(-20px) scale(0.8); opacity: 0; }
        }

        .win-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .win-effect h2 {
            font-size: 4rem;
            color: #ffd700;
            margin-bottom: 20px;
            animation: bounce 0.5s;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .win-effect p {
            font-size: 2rem;
            color: white;
        }

        .close-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.4rem;
            background: #11998e;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🧠 记忆翻牌</h1>
    
    <div class="info-bar">
        <div class="info-box">步数: <span id="moves">0</span></div>
        <div class="info-box">用时: <span id="time">0</span>秒</div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <button class="start-btn" id="startBtn" onclick="startGame()">开始游戏</button>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const movesDisplay = document.getElementById('moves');
        const timeDisplay = document.getElementById('time');
        const startBtn = document.getElementById('startBtn');
        
        // 使用emoji作为卡片图案
        const emojis = ['🍎', '🍌', '🍇', '🍊', '🍓', '🍑', '🥝', '🍒'];
        
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let time = 0;
        let timer = null;
        let gameStarted = false;

        const encourages = [
            "记性好！👍",
            "太棒了！🌟",
            "好厉害！🎉",
            "真聪明！💪",
            "棒棒的！✨",
            "记忆力满分！🏆"
        ];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createCards() {
            // 创建成对的卡片
            const pairs = [...emojis, ...emojis];
            shuffle(pairs);
            
            gameBoard.innerHTML = '';
            cards = [];
            
            pairs.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.emoji = emoji;
                
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">❓</div>
                        <div class="card-back">${emoji}</div>
                    </div>
                `;
                
                card.addEventListener('click', () => flipCard(card));
                gameBoard.appendChild(card);
                cards.push(card);
            });
        }

        function flipCard(card) {
            if (!gameStarted) return;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                movesDisplay.textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const match = card1.dataset.emoji === card2.dataset.emoji;

            if (match) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                
                // 显示配对成功特效
                showMatchEffect();
                showEncourage();
                
                flippedCards = [];
                
                // 检查是否全部配对完成
                if (matchedPairs === emojis.length) {
                    setTimeout(showWin, 500);
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                }, 1000);
            }
        }

        function showMatchEffect() {
            const effect = document.createElement('div');
            effect.className = 'match-effect';
            effect.textContent = '✅';
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 600);
        }

        function showEncourage() {
            const encourage = document.createElement('div');
            encourage.className = 'encourage';
            encourage.textContent = encourages[Math.floor(Math.random() * encourages.length)];
            document.body.appendChild(encourage);
            setTimeout(() => encourage.remove(), 1000);
        }

        function showWin() {
            clearInterval(timer);
            gameStarted = false;
            
            const winDiv = document.createElement('div');
            winDiv.className = 'win-effect';
            winDiv.innerHTML = `
                <h2>🎊 恭喜通关！</h2>
                <p>步数: ${moves} | 用时: ${time}秒</p>
                <p style="margin-top: 10px; color: #ffd700;">${getWinMessage()}</p>
                <button class="close-btn" onclick="this.parentElement.remove()">再来一局</button>
            `;
            document.body.appendChild(winDiv);
        }

        function getWinMessage() {
            if (moves <= 10 && time <= 30) return "超级高手！记忆力惊人！🌟";
            if (moves <= 16) return "非常棒！继续加油！💪";
            return "不错哦！经常练习会更好！👍";
        }

        function startGame() {
            matchedPairs = 0;
            moves = 0;
            time = 0;
            flippedCards = [];
            gameStarted = true;
            
            movesDisplay.textContent = moves;
            timeDisplay.textContent = time;
            startBtn.disabled = true;
            startBtn.textContent = "游戏中...";
            
            createCards();
            
            if (timer) clearInterval(timer);
            timer = setInterval(() => {
                time++;
                timeDisplay.textContent = time;
            }, 1000);
        }

        // 初始化
        createCards();
    </script>
</body>
</html>
